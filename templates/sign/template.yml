# sign — cosign keyless 서명 + 이미지 SBOM(CycloneDX) attestation (FE/BE 공통)
#   build 가 내보낸 IMAGE_DIGEST(dotenv) 기준으로 서명.
#
#   SBOM 은 trivy 가 "푸시된 그 이미지(digest)"를 직접 분석해 생성 후 attest.
#     - 런타임에 실제 들어있는 내용물 기준 (FE scratch 정적 이미지는 작게 나오는 게 정상)
#     - 소스(npm 등) 의존성 SBOM 이 따로 필요하면 앱 repo 에서 trivy fs 로 생성해 별도 attest
#     - 기존 gl-sbom-*.cdx.json(내장 Dependency-Scanning) 의존 제거
#       — gemnasium 이 Yarn Berry 미지원이라 FE 에선 한 번도 생성된 적 없던 경로
#
#   keyless: GitLab OIDC(id_token) → Fulcio 인증서 + Rekor 투명성로그.
spec:
  inputs:
    stage:
      default: sign
    image:
      default: $CI_REGISTRY_IMAGE
    cosign_version:
      default: v3.0.6
    cosign_sha256:
      # cosign-linux-amd64 의 공식 sha256 (릴리스 cosign_checksums.txt) — 버전 올릴 때 같이 갱신
      default: c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74
    trivy_version:
      default: 0.71.0                   # 레거시 scan 컴포넌트와 버전 통일
    trivy_sha256:
      # trivy_<ver>_Linux-64bit.tar.gz 의 공식 sha256 (릴리스 *_checksums.txt) — 버전 올릴 때 같이 갱신
      default: 30a3d22b23f88c233f1658f562fb477cae3b3e8b4761109d515b7698daf85814
---
sign:
  stage: $[[ inputs.stage ]]
  image: alpine:3.22@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - job: build              # IMAGE_DIGEST(dotenv) 수신
      artifacts: true
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - apk add --no-cache curl
    # cosign 설치 — sha256 핀으로 다운로드 무결성 검증 후에만 실행권한 부여
    - curl -sSfL "https://github.com/sigstore/cosign/releases/download/$[[ inputs.cosign_version ]]/cosign-linux-amd64" -o /usr/local/bin/cosign
    - echo "$[[ inputs.cosign_sha256 ]]  /usr/local/bin/cosign" | sha256sum -c -
    - chmod +x /usr/local/bin/cosign
    # trivy 설치 (SBOM 생성용) — 동일하게 sha256 핀
    - curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v$[[ inputs.trivy_version ]]/trivy_$[[ inputs.trivy_version ]]_Linux-64bit.tar.gz" -o /tmp/trivy.tgz
    - echo "$[[ inputs.trivy_sha256 ]]  /tmp/trivy.tgz" | sha256sum -c -
    - tar -xzf /tmp/trivy.tgz -C /usr/local/bin trivy
    # 레지스트리 인증 — cosign/trivy 둘 다 ~/.docker/config.json 사용
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > ~/.docker/config.json
    # dotenv 로 받은 digest 형식 검증 (빈 값/오염 차단)
    - echo "$IMAGE_DIGEST" | grep -qE '^sha256:[0-9a-f]{64}$' || { echo "IMAGE_DIGEST 형식 오류('$IMAGE_DIGEST') — build 선행/출력 확인"; exit 1; }
    # ① 서명 — 푸시된 불변 digest 에 서명
    - cosign sign --yes "$[[ inputs.image ]]@$IMAGE_DIGEST"
    # ② SBOM 생성 — 방금 서명한 "그 digest" 를 분석 (런타임 내용물 기준 CycloneDX)
    - trivy image --format cyclonedx --output sbom.cdx.json "$[[ inputs.image ]]@$IMAGE_DIGEST"
    # ③ SBOM attestation — 같은 keyless 신원으로 서명되어 이미지 digest 에 결합
    - cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "$[[ inputs.image ]]@$IMAGE_DIGEST"
  artifacts:
    paths: [sbom.cdx.json]              # 파이프라인 UI 에서 SBOM 확인용
    expire_in: 1 week
