# bump — GitOps write-back: sapari-helm-manifest 의 이미지를 불변 digest 로 갱신 (FE/BE 공통)
#   build 가 내보낸 dotenv IMAGE_DIGEST(=sha256:...)를 받아 image: <repo>@sha256:... 로 고정.
#   digest = cosign 이 서명한 바로 그 이미지 → 재현성+공급망 보안(태그 재사용 불일치 차단).
#   ArgoCD가 그 커밋을 보고 배포한다(CI는 배포 안 함).
#   필요 변수: MANIFEST_WRITE_TOKEN (대상 repo write_repository 권한, Masked CI 변수)
spec:
  inputs:
    stage:
      default: bump
    image:
      default: $CI_REGISTRY_IMAGE
    manifest_repo:
      default: gitlab.com/sagopanda/sapari-helm-manifest.git
    manifest_file:                       # 대상 매니페스트 경로 (필수)
    container_name:
      default: web                       # 이미지 갱신할 컨테이너 이름
    target_branch:
      default: main
---
bump:
  stage: $[[ inputs.stage ]]
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - job: build          # IMAGE_DIGEST(dotenv) 수신
      artifacts: true
    - job: sign           # 서명 끝난 뒤 배포되도록 순서 보장
  variables:
    GIT_STRATEGY: none                   # 앱 repo 체크아웃 불필요(대상 repo만 clone)
  script:
    - apk add --no-cache git yq
    - test -n "$IMAGE_DIGEST" || { echo "IMAGE_DIGEST 없음 — build 선행 필요"; exit 1; }
    - git config --global user.email "ci-bot@sagopanda.local"
    - git config --global user.name  "$CI_PROJECT_NAME CI"
    - git clone --depth 1 "https://oauth2:${MANIFEST_WRITE_TOKEN}@$[[ inputs.manifest_repo ]]" manifest
    - cd manifest
    - export NEWIMAGE="$[[ inputs.image ]]@${IMAGE_DIGEST}"   # 불변 digest 핀
    - export CNAME="$[[ inputs.container_name ]]"
    - yq -i '(.spec.template.spec.containers[] | select(.name == strenv(CNAME)) | .image) = strenv(NEWIMAGE)' "$[[ inputs.manifest_file ]]"
    - git add "$[[ inputs.manifest_file ]]"
    - |
      if git diff --cached --quiet; then
        echo "이미지 변경 없음 — bump 스킵"; exit 0
      fi
    - 'git commit -m "chore($CI_PROJECT_NAME): bump image to ${CI_COMMIT_SHORT_SHA} [skip ci]"'
    - git push origin "HEAD:$[[ inputs.target_branch ]]"
